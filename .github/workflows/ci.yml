name: CI

on:
  push:
    branches: [main]
  pull_request:

# The app lives in the 2xeb-portfolio/ subdirectory.
defaults:
  run:
    working-directory: 2xeb-portfolio

jobs:
  build:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: 2xeb-portfolio/.nvmrc
          cache: npm
          cache-dependency-path: 2xeb-portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
